<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Choopan Grill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header / Navigation -->
  <header>
    <div class="logo">Choopan Grill</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="menu.html">Menu</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- Contact Section -->
  <main>
    <section class="contact-form">
      <h1>Contact Us</h1>
      <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
      <p id="formFeedback" style="color:green;"></p>
    </section>

    <!-- Location Section -->
    <section class="location">
      <h2>Our Location</h2>
      <p>Choopan Grill</p>
      <p>15 West Marie St, Hicksville, NY 11801</p>
      <p>Open: 11:00 AM - 10:00 PM</p>

      <h3>See us on the map:</h3>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3021.536231!2d-73.526635!3d40.768795!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c27b2c1d6e0c87%3A0x7bfa1cde0e7f2b6c!2s15%20W%20Marie%20St%2C%20Hicksville%2C%20NY%2011801%2C%20USA!5e0!3m2!1sen!2sus!4v1700000000000!5m2!1sen!2sus"
        width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy">
      </iframe>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>Contact us: info@choopangrill.com | +1 123 456 7890</p>
  </footer>

  <!-- JavaScript -->
  <script>
    // Simple form validation and feedback
    const form = document.getElementById('contactForm');
    const feedback = document.getElementById('formFeedback');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;

      if(name && email && message) {
        feedback.textContent = "Thank you! Your message has been sent.";
        form.reset();
      } else {
        feedback.textContent = "Please fill out all fields.";
        feedback.style.color = "red";
      }
    });
  </script>
</body>
</html>
