<section class="contact">
  <h1>Contact Us</h1>
  <form id="contactForm">
    <label>Name</label>
    <input type="text" id="name" required>
    
    <label>Email</label>
    <input type="email" id="email" required>
    
    <label>Message</label>
    <textarea id="message" required></textarea>
    
    <button type="submit">Send</button>
  </form>
</section>
